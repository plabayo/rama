[package]
name = "rama-tls"
description = "rama TLS-agnostic types and utilities"
version = { workspace = true }
license = { workspace = true }
edition = { workspace = true }
repository = { workspace = true }
keywords = ["io", "async", "tls", "network", "rama"]
categories = ["asynchronous", "network-programming", "cryptography", "web-programming"]
authors = { workspace = true }
rust-version = { workspace = true }

[package.metadata.cargo-public-api-crates]
allowed = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "x86_64-apple-darwin",
    "aarch64-apple-ios",
    "aarch64-linux-android",
]

[features]
default = []
http = ["rama-net/http"]
dial9 = ["dep:dial9-trace-format", "rama-core/dial9"]

[dependencies]
ahash = { workspace = true }
bytes = { workspace = true }
dial9-trace-format = { workspace = true, optional = true }
flume = { workspace = true, features = ["async"] }
hex = { workspace = true }
itertools = { workspace = true }
jiff = { workspace = true }
md5 = { workspace = true }
nom = { workspace = true }
parking_lot = { workspace = true }
pin-project-lite = { workspace = true }
rama-core = { workspace = true }
rama-crypto = { workspace = true }
rama-net = { workspace = true }
rama-utils = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
tokio = { workspace = true, features = ["macros", "io-util", "net"] }

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tokio-test = { workspace = true }

[lints]
workspace = true
