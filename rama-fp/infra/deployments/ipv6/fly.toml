# fly.toml app configuration file generated for rama-echo on 2024-03-19T23:16:07+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rama-ipv6'
primary_region = 'fra'

[processes]
app_secure = "serve ip --bind '[::]:8443' -c 2048 -f haproxy -s"
app_insecure = "serve ip --bind '[::]:8080' -c 2048 -f haproxy"

[build]
image = 'glendc/rama:edge'

[env]
RUST_LOG = 'debug'
# opt-in IP geolocation; files are placed on the 'geoip' volume by geoip_sync.sh
RAMA_IP_GEO_DB = 'geolite2=/geoip/GeoLite2-City.mmdb+/geoip/GeoLite2-ASN.mmdb;ip2location=/geoip/IP2Location-LITE-DB11.mmdb'

# one entry per process group: a bare [mounts] only attaches to one group
[[mounts]]
source = 'geoip'
destination = '/geoip'
processes = ['app_secure']

[[mounts]]
source = 'geoip'
destination = '/geoip'
processes = ['app_insecure']

[[services]]
protocol = 'tcp'
internal_port = 8080
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 1
processes = ['app_insecure']

[[services.ports]]
handlers = ["proxy_proto"]
port = 80

[[services]]
protocol = 'tcp'
internal_port = 8443
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 1
processes = ['app_secure']

[[services.ports]]
handlers = ["proxy_proto"]
port = 443

[[vm]]
memory = '256mb'
cpu_kind = 'shared'
cpus = 1
