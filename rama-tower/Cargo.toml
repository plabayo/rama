[package]
name = "rama-tower"
description = "tower support for rama"
version = { workspace = true }
license = { workspace = true }
edition = { workspace = true }
repository = { workspace = true }
keywords = ["io", "async", "tower", "rama"]
categories = ["asynchronous", "network-programming", "web-programming"]
authors = { workspace = true }
rust-version = { workspace = true }

[package.metadata.cargo-public-api-crates]
allowed = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "x86_64-apple-darwin",
    "aarch64-apple-ios",
    "aarch64-linux-android",
]

[features]
default = []
# Adapt tower services that speak the hyperium `http::Request`/`http::Response`
# into rama services, converting via `rama-http-hyperium`.
http = ["dep:http", "dep:http-body", "dep:rama-http-types", "dep:rama-http-hyperium"]

[dependencies]
http = { workspace = true, optional = true }
http-body = { workspace = true, optional = true }
rama-core = { workspace = true, features = ["std"] }
rama-http-hyperium = { workspace = true, optional = true }
rama-http-types = { workspace = true, optional = true }
tokio = { workspace = true }
tower-layer = { workspace = true }
tower-service = { workspace = true }

[dev-dependencies]

[lints]
workspace = true
