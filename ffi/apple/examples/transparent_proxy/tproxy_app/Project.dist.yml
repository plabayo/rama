name: RamaTransparentProxyExample
options:
  bundleIdPrefix: ADPG6C355H
  deploymentTarget:
    macOS: "12.0"

packages:
  RamaAppleNetworkExtension:
    path: ../../../../..
  X509:
    url: https://github.com/apple/swift-certificates.git
    from: 1.0.0

targets:
  RamaTransparentProxyExampleHost:
    type: application
    platform: macOS
    sources:
      - path: Host
      - path: Shared
    dependencies:
      - target: RamaTransparentProxyExampleExtension
        embed: true
        codeSign: true
      - target: RamaTransparentProxyExampleXpcService
      - package: X509
        product: X509
    postBuildScripts:
      - name: Embed XPC Helper and LaunchDaemon Template
        script: |
          set -euo pipefail

          HELPER_APP="$BUILT_PRODUCTS_DIR/RamaTransparentProxyExampleXpcService.app"
          HOST_RESOURCES_DIR="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Resources"
          HOST_DAEMONS_DIR="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Library/LaunchDaemons"
          PLIST_SOURCE="$SRCROOT/XpcService/org.ramaproxy.example.tproxy.dist.xpc.plist"

          mkdir -p "$HOST_RESOURCES_DIR" "$HOST_DAEMONS_DIR"
          rm -rf "$HOST_RESOURCES_DIR/RamaTransparentProxyExampleXpcService.app"
          ditto "$HELPER_APP" "$HOST_RESOURCES_DIR/RamaTransparentProxyExampleXpcService.app"
          cp "$PLIST_SOURCE" "$HOST_DAEMONS_DIR/"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.ramaproxy.example.tproxy.dist
        CURRENT_PROJECT_VERSION: "$(RAMA_TPROXY_CURRENT_PROJECT_VERSION)"
        INFOPLIST_FILE: Host/Info.plist
        MARKETING_VERSION: "$(RAMA_TPROXY_MARKETING_VERSION)"
        CODE_SIGN_ENTITLEMENTS: Host/Host.entitlements
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "$(RAMA_TPROXY_HOST_SIGNING_IDENTITY)"
        DEVELOPMENT_TEAM: "$(RAMA_TPROXY_DEVELOPMENT_TEAM)"
        PROVISIONING_PROFILE_SPECIFIER: "$(RAMA_TPROXY_HOST_PROFILE_SPECIFIER)"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        NE_ENTITLEMENT_SUFFIX: "-systemextension"
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        GENERATE_PROVISIONING_PROFILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        OTHER_CODE_SIGN_FLAGS:
          - "--timestamp"
          - "--options=runtime"
        TPROXY_XPC_SERVICE_NAME: org.ramaproxy.example.tproxy.dist.xpc

  RamaTransparentProxyExampleExtension:
    type: system-extension
    platform: macOS
    sources:
      - path: Extension
      - path: Shared
    dependencies:
      - package: RamaAppleNetworkExtension
        product: RamaAppleNetworkExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.ramaproxy.example.tproxy.dist.provider
        PRODUCT_NAME: org.ramaproxy.example.tproxy.dist.provider
        CURRENT_PROJECT_VERSION: "$(RAMA_TPROXY_CURRENT_PROJECT_VERSION)"
        INFOPLIST_FILE: Extension/Info.plist
        MARKETING_VERSION: "$(RAMA_TPROXY_MARKETING_VERSION)"
        CODE_SIGN_ENTITLEMENTS: Extension/Extension.entitlements
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "$(RAMA_TPROXY_EXTENSION_SIGNING_IDENTITY)"
        DEVELOPMENT_TEAM: "$(RAMA_TPROXY_DEVELOPMENT_TEAM)"
        PROVISIONING_PROFILE_SPECIFIER: "$(RAMA_TPROXY_EXTENSION_PROFILE_SPECIFIER)"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        NE_ENTITLEMENT_SUFFIX: "-systemextension"
        TPROXY_XPC_SERVICE_NAME: org.ramaproxy.example.tproxy.dist.xpc
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        GENERATE_PROVISIONING_PROFILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        OTHER_CODE_SIGN_FLAGS:
          - "--timestamp"
          - "--options=runtime"
        ENABLE_DEBUG_DYLIB: NO
        OTHER_LDFLAGS:
          - "$(SRCROOT)/../tproxy_rs/target/universal/librama_tproxy_example.a"
          - "-framework"
          - "NetworkExtension"
          - "-framework"
          - "SystemConfiguration"
          - "-lz"

  RamaTransparentProxyExampleXpcService:
    type: application
    platform: macOS
    sources:
      - path: XpcService
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.ramaproxy.example.tproxy.dist.xpc
        PRODUCT_NAME: RamaTransparentProxyExampleXpcService
        CURRENT_PROJECT_VERSION: "$(RAMA_TPROXY_CURRENT_PROJECT_VERSION)"
        INFOPLIST_FILE: XpcService/Info.agent.plist
        MARKETING_VERSION: "$(RAMA_TPROXY_MARKETING_VERSION)"
        CODE_SIGN_ENTITLEMENTS: XpcService/XpcService.entitlements
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "$(RAMA_TPROXY_XPCSERVICE_SIGNING_IDENTITY)"
        DEVELOPMENT_TEAM: "$(RAMA_TPROXY_DEVELOPMENT_TEAM)"
        PROVISIONING_PROFILE_SPECIFIER: "$(RAMA_TPROXY_XPCSERVICE_PROFILE_SPECIFIER)"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        GENERATE_PROVISIONING_PROFILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        OTHER_CODE_SIGN_FLAGS:
          - "-i"
          - "$(PRODUCT_BUNDLE_IDENTIFIER)"
          - "--timestamp"
          - "--options=runtime"
