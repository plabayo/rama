name: RamaTransparentProxyExample
options:
  bundleIdPrefix: ADPG6C355H
  deploymentTarget:
    macOS: "12.0"

packages:
  RamaAppleNetworkExtension:
    path: ../../../../..
  X509:
    url: https://github.com/apple/swift-certificates.git
    from: 1.0.0

targets:
  RamaTransparentProxyExampleHost:
    type: application
    platform: macOS
    sources:
      - path: Host
      - path: Shared
    dependencies:
      - target: RamaTransparentProxyExampleExtension
        embed: true
        codeSign: true
      - target: RamaTransparentProxyExampleXpcService
        embed: true
        codeSign: true
      - package: X509
        product: X509
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.ramaproxy.example.tproxy.dev
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Host/Info.plist
        MARKETING_VERSION: 0.1
        CODE_SIGN_ENTITLEMENTS: Host/Host.entitlements
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "$(RAMA_TPROXY_HOST_SIGNING_IDENTITY)"
        DEVELOPMENT_TEAM: "$(RAMA_TPROXY_DEVELOPMENT_TEAM)"
        PROVISIONING_PROFILE_SPECIFIER: "$(RAMA_TPROXY_HOST_PROFILE_SPECIFIER)"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        NE_ENTITLEMENT_SUFFIX: ""

  RamaTransparentProxyExampleXpcService:
    type: xpc-service
    platform: macOS
    sources:
      - path: XpcService
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.ramaproxy.example.tproxy.dev.xpc
        PRODUCT_NAME: RamaTransparentProxyExampleXpcService
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: XpcService/Info.plist
        MARKETING_VERSION: 0.1
        CODE_SIGN_ENTITLEMENTS: XpcService/XpcService.entitlements
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "$(RAMA_TPROXY_HOST_SIGNING_IDENTITY)"
        DEVELOPMENT_TEAM: "$(RAMA_TPROXY_DEVELOPMENT_TEAM)"
        PROVISIONING_PROFILE_SPECIFIER: "$(RAMA_TPROXY_XPCSERVICE_PROFILE_SPECIFIER)"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        SKIP_INSTALL: YES
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
          - _GNU_SOURCE=1

  RamaTransparentProxyExampleExtension:
    type: system-extension
    platform: macOS
    sources:
      - path: Extension
      - path: Shared
    postBuildScripts:
      - name: Bump CFBundleVersion
        script: |
          VERSION=$(date +%Y%m%d%H%M%S)
          PLIST="$TARGET_BUILD_DIR/$INFOPLIST_PATH"

          echo "Updating CFBundleVersion in $PLIST to $VERSION"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" "$PLIST"

          if [ "${CODE_SIGNING_ALLOWED:-YES}" != "YES" ] || [ -z "${EXPANDED_CODE_SIGN_IDENTITY:-}" ]; then
            echo "Skipping re-sign because code signing is disabled or no identity is available"
            exit 0
          fi

          echo "Re-signing $CODESIGNING_FOLDER_PATH"
          /usr/bin/codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" --timestamp=none "$CODESIGNING_FOLDER_PATH"
    dependencies:
      - package: RamaAppleNetworkExtension
        product: RamaAppleNetworkExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.ramaproxy.example.tproxy.dev.provider
        PRODUCT_NAME: org.ramaproxy.example.tproxy.dev.provider
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Extension/Info.plist
        MARKETING_VERSION: 0.1
        CODE_SIGN_ENTITLEMENTS: Extension/Extension.entitlements
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "$(RAMA_TPROXY_EXTENSION_SIGNING_IDENTITY)"
        DEVELOPMENT_TEAM: "$(RAMA_TPROXY_DEVELOPMENT_TEAM)"
        PROVISIONING_PROFILE_SPECIFIER: "$(RAMA_TPROXY_EXTENSION_PROFILE_SPECIFIER)"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        NE_ENTITLEMENT_SUFFIX: ""
        ENABLE_DEBUG_DYLIB: NO
        OTHER_LDFLAGS:
          - "$(SRCROOT)/../tproxy_rs/target/universal/librama_tproxy_example.a"
          - "-framework"
          - "NetworkExtension"
          - "-framework"
          - "SystemConfiguration"
          - "-lz"
