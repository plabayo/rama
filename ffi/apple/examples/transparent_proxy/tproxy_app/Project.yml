name: RamaTransparentProxyExample
options:
  bundleIdPrefix: ADPG6C355H
  deploymentTarget:
    macOS: "12.0"

packages:
  RamaAppleNetworkExtension:
    path: ../../../../..

targets:
  RamaTransparentProxyExampleHost:
    type: application
    platform: macOS
    sources:
      - path: Host
    dependencies:
      - target: RamaTransparentProxyExampleExtension
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.ramaproxy.example.tproxy.dev
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Host/Info.plist
        MARKETING_VERSION: 0.1
        CODE_SIGN_ENTITLEMENTS: Host/Host.entitlements
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "$(RAMA_TPROXY_HOST_SIGNING_IDENTITY)"
        DEVELOPMENT_TEAM: "$(RAMA_TPROXY_DEVELOPMENT_TEAM)"
        PROVISIONING_PROFILE_SPECIFIER: "$(RAMA_TPROXY_HOST_PROFILE_SPECIFIER)"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        NE_ENTITLEMENT_SUFFIX: ""
        SWIFT_ACTIVE_COMPILATION_CONDITIONS:
          - "$(inherited)"
          - TPROXY_DEV_IDENTIFIERS

  RamaTransparentProxyExampleExtension:
    type: system-extension
    platform: macOS
    sources:
      - path: Extension
    dependencies:
      - package: RamaAppleNetworkExtension
        product: RamaAppleNetworkExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.ramaproxy.example.tproxy.dev.provider
        PRODUCT_NAME: org.ramaproxy.example.tproxy.dev.provider
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Extension/Info.plist
        MARKETING_VERSION: 0.1
        CODE_SIGN_ENTITLEMENTS: Extension/Extension.entitlements
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "$(RAMA_TPROXY_EXTENSION_SIGNING_IDENTITY)"
        DEVELOPMENT_TEAM: "$(RAMA_TPROXY_DEVELOPMENT_TEAM)"
        PROVISIONING_PROFILE_SPECIFIER: "$(RAMA_TPROXY_EXTENSION_PROFILE_SPECIFIER)"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        NE_ENTITLEMENT_SUFFIX: ""
        ENABLE_DEBUG_DYLIB: NO
        OTHER_LDFLAGS:
          - "$(SRCROOT)/../tproxy_rs/target/universal/librama_tproxy_example.a"
          - "-framework"
          - "NetworkExtension"
          - "-framework"
          - "SystemConfiguration"
          - "-lz"
