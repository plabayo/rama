[package]
name = "rama-socks5"
description = "SOCKS5 support for rama"
version = { workspace = true }
license = { workspace = true }
edition = { workspace = true }
repository = { workspace = true }
keywords = ["io", "async", "socks5", "network", "rama"]
categories = ["asynchronous", "network-programming", "web-programming"]
authors = { workspace = true }
rust-version = { workspace = true }

[package.metadata.cargo-public-api-crates]
allowed = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "x86_64-apple-darwin",
    "aarch64-apple-ios",
    "aarch64-linux-android",
]

[features]
default = []
# Optional [dial9] runtime telemetry support.
#
# Building with this feature requires `--cfg tokio_unstable`.
#
# [dial9]: https://github.com/dial9-rs/dial9-tokio-telemetry
dial9 = ["dep:dial9-tokio-telemetry", "dep:dial9-trace-format", "rama-net/dial9"]

[dependencies]
byteorder = { workspace = true }
dial9-tokio-telemetry = { workspace = true, optional = true }
dial9-trace-format = { workspace = true, optional = true }
rama-core = { workspace = true }
rama-dns = { workspace = true }
rama-net = { workspace = true, features = ["http"] }
rama-tcp = { workspace = true, features = ["http"] }
rama-udp = { workspace = true }
rama-utils = { workspace = true }
tokio = { workspace = true }

[dev-dependencies]
parking_lot = { workspace = true }
tokio-test = { workspace = true }

[lints]
workspace = true
