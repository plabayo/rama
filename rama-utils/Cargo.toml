[package]
name = "rama-utils"
description = "utilities crate for rama"
version = { workspace = true }
license = { workspace = true }
edition = { workspace = true }
repository = { workspace = true }
keywords = ["rama"]
categories = ["asynchronous", "network-programming", "web-programming"]
authors = { workspace = true }
rust-version = { workspace = true }

[package.metadata.cargo-public-api-crates]
allowed = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "x86_64-apple-darwin",
    "aarch64-apple-ios",
    "aarch64-linux-android",
]

[features]
default = ["std"]
std = [
    "rama-macros/std",
    "smallvec/write",
    "smol_str/std",
    "dep:tokio",
    "serde/std",
    "dep:parking_lot",
    "dep:regex",
    "dep:wildcard",
    "memchr/std",
    "tracing/std",
]

[dependencies]
const_format = { workspace = true }
# no workspace inherit: default features (std) must stay off for no_std builds
memchr = { version = "2.8", default-features = false }
parking_lot = { workspace = true, optional = true }
pin-project-lite = { workspace = true }
rama-macros = { workspace = true }
regex = { workspace = true, features = ["perf", "unicode"], optional = true }
serde = { workspace = true, features = ["derive"] }
smallvec = { workspace = true, features = ["serde", "const_generics", "const_new"] }
smol_str = { workspace = true, features = ["serde"] }
tokio = { workspace = true, features = ["fs", "time", "macros", "sync"], optional = true }
# no workspace inherit: default features (std) must stay off for no_std builds
tracing = { version = "0.1", default-features = false }
wildcard = { workspace = true, optional = true }

[dev-dependencies]
ahash = { workspace = true }
quickcheck = { workspace = true }
serde_json = { workspace = true }
serde_test = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["fs", "io-util", "time", "macros", "sync", "rt-multi-thread"] }
trybuild = { workspace = true }

[target.'cfg(loom)'.dev-dependencies]
loom = "0.7"

[lints]
workspace = true
