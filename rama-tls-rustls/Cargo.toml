[package]
name = "rama-tls-rustls"
description = "tls implementations for rama using rustls"
version = { workspace = true }
license = { workspace = true }
edition = { workspace = true }
repository = { workspace = true }
keywords = ["io", "async", "tls", "network", "rama"]
categories = ["asynchronous", "network-programming", "cryptography", "web-programming"]
authors = { workspace = true }
rust-version = { workspace = true }

[package.metadata.cargo-public-api-crates]
allowed = []

[package.metadata.docs.rs]
all-features = true
rustc-args = ["--cfg", "tokio_unstable"]
rustdoc-args = ["--cfg", "docsrs"]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "x86_64-apple-darwin",
    "aarch64-apple-ios",
    "aarch64-linux-android",
]

[features]
default = []
http = ["rama-net/http", "rama-tls/http"]
aws-lc = [
    "rustls/aws_lc_rs",
    "tokio-rustls/aws_lc_rs",
    "rcgen/aws_lc_rs",
    "rustls/prefer-post-quantum",
    "rama-crypto/aws-lc",
]
ring = ["rustls/ring", "tokio-rustls/ring", "rcgen/ring", "rama-crypto/ring"]
# Optional [dial9] runtime telemetry support.
#
# Building with this feature requires `--cfg tokio_unstable`.
#
# [dial9]: https://github.com/dial9-rs/dial9-tokio-telemetry
dial9 = [
    "dep:dial9-tokio-telemetry",
    "dep:dial9-trace-format",
    "rama-net/dial9",
    "rama-tls/dial9",
]

[dependencies]
dial9-tokio-telemetry = { workspace = true, optional = true }
dial9-trace-format = { workspace = true, optional = true }
pin-project-lite = { workspace = true }
rama-core = { workspace = true, features = ["std"] }
rama-crypto = { workspace = true, features = ["native-certs"] }
rama-net = { workspace = true, features = ["std"] }
rama-tls = { workspace = true }
rama-utils = { workspace = true, features = ["std"] }
rcgen = { workspace = true, optional = true }
rustls = { workspace = true }
tokio = { workspace = true, features = ["macros", "io-std"] }
tokio-rustls = { workspace = true }
webpki-roots = { workspace = true }

[dev-dependencies]

[lints]
workspace = true
