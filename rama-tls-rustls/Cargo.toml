[package]
name = "rama-tls-rustls"
description = "tls implementations for rama using rustls"
version = { workspace = true }
license = { workspace = true }
edition = { workspace = true }
repository = { workspace = true }
keywords = ["io", "async", "tls", "network", "rama"]
categories = ["asynchronous", "network-programming", "cryptography", "web-programming"]
authors = { workspace = true }
rust-version = { workspace = true }

[package.metadata.cargo-public-api-crates]
allowed = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "x86_64-apple-darwin",
    "aarch64-apple-ios",
    "aarch64-linux-android",
]

[features]
default = []
http = ["dep:rama-http-types"]
aws-lc = [
    "rustls/aws_lc_rs",
    "tokio-rustls/aws_lc_rs",
    "rcgen/aws_lc_rs",
    "x509-parser/verify-aws",
    "rustls/prefer-post-quantum",
]
ring = ["rustls/ring", "tokio-rustls/ring", "rcgen/ring", "x509-parser/verify"]
# Define [`dial9`] runtime-telemetry events for TLS handshake lifecycle
# (started / completed / failed) and emit them at the corresponding
# points in the rustls connector. Emission is a no-op when no
# `dial9-tokio-telemetry::TracedRuntime` is wired into the runtime.
#
# Building with this feature requires `--cfg tokio_unstable` (set
# workspace-wide in `.cargo/config.toml`).
#
# [dial9]: https://github.com/dial9-rs/dial9-tokio-telemetry
dial9 = ["dep:dial9-tokio-telemetry", "dep:dial9-trace-format"]

[dependencies]
dial9-tokio-telemetry = { workspace = true, optional = true }
dial9-trace-format = { workspace = true, optional = true }
pin-project-lite = { workspace = true }
rama-core = { workspace = true }
rama-http-types = { workspace = true, optional = true }
rama-net = { workspace = true, features = ["tls", "http"] }
rama-utils = { workspace = true }
rcgen = { workspace = true, optional = true }
rustls = { workspace = true }
rustls-native-certs = { workspace = true }
rustls-pki-types = { workspace = true }
tokio = { workspace = true, features = ["macros", "io-std"] }
tokio-rustls = { workspace = true }
webpki-roots = { workspace = true }
x509-parser = { workspace = true }

[dev-dependencies]

[lints]
workspace = true
