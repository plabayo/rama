# Sample workflow for building and deploying a mdBook site to GitHub Pages
#
# To get started with mdBook see: https://rust-lang.github.io/mdBook/index.html
#
name: Deploy mdBook site to Pages

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: stable

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Apple-vendor crates (rama-net-apple-networkextension, rama-net-apple-xpc) are gated on
  # `target_vendor = "apple"` and depend on Apple SDK headers via bindgen + Apple-only FFI
  # symbols, so they cannot be documented from a Linux runner. We build them here in a
  # parallel job and merge the resulting per-crate doc directories into the main docs
  # site below.
  build-apple-docs:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{env.RUST_TOOLCHAIN}}
      - uses: Swatinem/rust-cache@v2
        with:
          env-vars: "RUST_TOOLCHAIN=${{env.RUST_TOOLCHAIN}}"
          key: macos-apple-docs
      - name: Generate Apple Rust Docs
        run: cargo +nightly doc --all-features --no-deps -p rama-net-apple-networkextension -p rama-net-apple-xpc
        env:
          RUSTDOCFLAGS: --cfg docsrs
      - name: Stage Apple doc subdirs
        run: |
          mkdir -p apple-docs
          cp -R target/doc/rama_net_apple_networkextension apple-docs/
          cp -R target/doc/rama_net_apple_xpc apple-docs/
      - name: Upload Apple docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: apple-docs
          path: apple-docs
          retention-days: 1

  # Build job
  build:
    runs-on: ubuntu-latest
    needs: build-apple-docs
    env:
      MDBOOK_VERSION: 0.5.2
      MDBOOK_GRAPHVIZ_VERSION: 0.3.1
    steps:
      - uses: actions/checkout@v6
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{env.RUST_TOOLCHAIN}}
      - uses: Swatinem/rust-cache@v2
        with:
          env-vars: "RUST_TOOLCHAIN=${{env.RUST_TOOLCHAIN_MSRV}}"
      - name: Generate Rust Docs
        run: cargo +nightly doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: --cfg docsrs
      - name: Download Apple docs artifact
        uses: actions/download-artifact@v4
        with:
          name: apple-docs
          path: apple-docs
      - name: Merge Apple doc subdirs into target/doc
        run: cp -R apple-docs/* target/doc/
      - name: Install Graphviz
        run: sudo apt-get install graphviz
      - name: Install mdBook
        run: |
          curl --proto '=https' --tlsv1.2 https://sh.rustup.rs -sSf -y | sh
          rustup update
          cargo install --version ${MDBOOK_VERSION} mdbook 2>/dev/null || true
          cargo install --version ${MDBOOK_GRAPHVIZ_VERSION} mdbook-graphviz 2>/dev/null || true
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      - name: Build with mdBook
        working-directory: ./docs/book
        run: mdbook build
      - name: Create artifact
        working-directory: ./docs
        run: |
          mkdir -p www/book
          cp -r book/book/* www/book
          mkdir -p www/docs
          cp -r ../target/doc/* www/docs
          mkdir -p www/static
          cp -r ./static/* www/static
          cp index.html www/index.html
          cp trademark.html www/trademark.html
          cp sitemap.xml www/sitemap.xml
          cp robots.txt www/robots.txt
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/www

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
