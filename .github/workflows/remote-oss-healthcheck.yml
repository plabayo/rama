name: Rama OSS basic health check

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

jobs:
  healthcheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: |
          bash rama-fp/infra/scripts/remote-healthcheck.sh
