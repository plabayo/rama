[package]
name = "rama-ttrpc"
description = "ttRPC (gRPC for low-memory environments) support for rama"
version = { workspace = true }
license = { workspace = true }
edition = { workspace = true }
repository = { workspace = true }
homepage = { workspace = true }
keywords = ["io", "async", "ttrpc", "network", "rama"]
categories = ["asynchronous", "network-programming"]
authors = { workspace = true }
rust-version = { workspace = true }

[package.metadata.cargo-public-api-crates]
allowed = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = []
# Re-export `rama-ttrpc-build` as `rama_ttrpc::build` so a `build.rs` can run codegen
protobuf = ["dep:rama-ttrpc-build"]
vendor-protoc = ["rama-ttrpc-build?/vendor-protoc"]

[dependencies]
ahash = { workspace = true }
bitflags = { workspace = true }
prost = { workspace = true }
prost-types = { workspace = true }
rama-core = { workspace = true, features = ["std"] }
rama-net = { workspace = true, features = ["std"] }
rama-ttrpc-build = { workspace = true, optional = true }
tokio = { workspace = true, features = ["io-util", "rt", "sync", "time", "macros"] }
tokio-stream = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "io-util", "test-util"] }

[lints]
workspace = true
