[package]
name = "rama-ws"
description = "WebSocket (WS) support for rama"
version = { workspace = true }
license = { workspace = true }
edition = { workspace = true }
repository = { workspace = true }
keywords = ["io", "async", "websocket", "http", "rama"]
categories = ["asynchronous", "network-programming", "web-programming"]
authors = { workspace = true }
rust-version = { workspace = true }

[package.metadata.cargo-public-api-crates]
allowed = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
# native C deps can't cross-compile in the docs.rs builder; linux-only docs
targets = ["x86_64-unknown-linux-gnu"]

[features]
default = []
compression = ["dep:flate2"]

[dependencies]
flate2 = { workspace = true, features = ["zlib"], optional = true }
rama-core = { workspace = true, features = ["std"] }
rama-http = { workspace = true }
rama-net = { workspace = true, features = ["std"] }
rama-utils = { workspace = true, features = ["std"] }
rand = { workspace = true }
tokio = { workspace = true, features = ["time", "macros"] }

[dev-dependencies]
parking_lot = { workspace = true }
pin-project-lite = { workspace = true }
tracing-test = { workspace = true }

[lints]
workspace = true
