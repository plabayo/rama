[package]
name = "rama-tcp"
description = "TCP support for rama"
version = { workspace = true }
license = { workspace = true }
edition = { workspace = true }
repository = { workspace = true }
keywords = ["io", "async", "tcp", "network", "rama"]
categories = ["asynchronous", "network-programming", "web-programming"]
authors = { workspace = true }
rust-version = { workspace = true }

[package.metadata.cargo-public-api-crates]
allowed = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "x86_64-apple-darwin",
    "aarch64-apple-ios",
    "aarch64-linux-android",
]

[features]
default = []

[dependencies]
pin-project-lite = { workspace = true }
rama-core = { workspace = true, features = ["std"] }
rama-net = { workspace = true, features = ["std"] }
rama-utils = { workspace = true, features = ["std"] }
rand = { workspace = true }
tokio = { workspace = true, features = ["macros", "net", "time"] }

[target.'cfg(target_family = "unix")'.dependencies]
libc = { workspace = true }

[dev-dependencies]
ahash = { workspace = true }

[lints]
workspace = true
